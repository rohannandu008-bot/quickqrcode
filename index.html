<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick QR Generator</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
width:320px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0056b3;
}

#qr img{
margin-top:15px;
width:200px;
height:200px;
}
</style>

</head>

<body>

<div class="container">
<h2>QR Code Generator</h2>

<input type="text" id="text" placeholder="Enter text or URL">

<br>

<button onclick="generateQR()">Generate QR</button>
<button onclick="downloadQR()">Download</button>

<div id="qr"></div>

</div>

<script>

let qrImage="";

function generateQR(){

let text=document.getElementById("text").value;

if(text===""){
alert("Enter text first");
return;
}

qrImage="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(text);

document.getElementById("qr").innerHTML=`<img src="${qrImage}" id="qrimg">`;

}

function downloadQR(){

if(qrImage===""){
alert("Generate QR first");
return;
}

let link=document.createElement("a");
link.href=qrImage;
link.download="qrcode.png";
link.click();

}

</script>

</body>
</html>
